<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Stránka nenalezena | Dluhypomoc</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Obrazky/Favicon.png">

    <style>
        .error-body {
            background: linear-gradient(135deg, #001a33 0%, #003366 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: var(--spacing-md);
        }

        .error-content {
            max-width: 600px;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0066cc 0%, #d89a0f 60%, #efac11 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .error-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--color-secondary);
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="error-body">
    <div class="error-content">
        <div class="error-icon">
            <i class="bi bi-shield-slash"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Ztratili jste se?</h1>
        <p class="hero__text mx-auto" style="margin-bottom: 3rem;">
            Tudy najdete cestu zpět...
        </p>
        <a href="index.html" class="btn btn--primary btn--large">
            <i class="bi bi-house-door-fill"></i> ZPĚT NA ÚVOD
        </a>
    </div>
</body>

</html>
